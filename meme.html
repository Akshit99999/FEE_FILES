<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😂 Meme Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#141E30,#243B55);
}

.container{
    text-align:center;
    padding:20px;
}

h1{
    color:white;
    margin-bottom:20px;
}

.meme{
    position:relative;
    display:inline-block;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.meme img{
    width:500px;
    max-width:90vw;
    display:block;
}

.text{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
    text-transform:uppercase;
    text-shadow:
        -2px -2px 0 black,
         2px -2px 0 black,
        -2px  2px 0 black,
         2px  2px 0 black,
         0 0 8px black;
}

.top{
    top:15px;
}

.bottom{
    bottom:15px;
}

button{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:8px;
    background:#ff4757;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff6b81;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>😂 Random Meme Generator</h1>

    <div class="meme">
        <img id="memeImage"
             src="https://i.imgflip.com/30b1gx.jpg"
             alt="Meme">
        <div class="text top" id="topText">WHEN THE CODE WORKS</div>
        <div class="text bottom" id="bottomText">DON'T TOUCH ANYTHING</div>
    </div>

    <br>
    <button onclick="generateMeme()">🎲 Generate Meme</button>
</div>

<script>
const memeData = [
{
img:"https://i.imgflip.com/26am.jpg",
top:"WHEN WIFI RETURNS",
bottom:"LIFE HAS MEANING AGAIN"
},
];

function generateMeme(){
    const meme = memeData[Math.floor(Math.random()*memeData.length)];

    document.getElementById("memeImage").src = meme.img;
    document.getElementById("topText").textContent = meme.top;
    document.getElementById("bottomText").textContent = meme.bottom;
}
</script>

</body>
</html>
