
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKshit</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Verdana, sans-serif;
}


body{
    height:100vh;
    background:linear-gradient(135deg,#800080,#4b0082);
    overflow:hidden;
}


/* Navbar */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 70px;
    color:white;
}


header h2{
    font-size:28px;
}


nav a{
    text-decoration:none;
    color:white;
    margin-left:30px;
    font-size:16px;
}


/* Background circles */

.circle{
    position:absolute;
    border-radius:50%;
}


.left{
    width:170px;
    height:170px;
    background:#ffc0cb;
    left:140px;
    top:220px;
}


.right{
    width:140px;
    height:140px;
    background:#fff6b0;
    right:170px;
    bottom:110px;
}



/* Login box */

.login-box{

    width:340px;
    margin:70px auto;
    padding:30px;

    background:rgba(255,255,255,0.18);

    border-radius:10px;

    text-align:center;

    color:white;

}



.login-box h1{
    margin-bottom:8px;
}


.login-box p{
    margin-bottom:18px;
    font-size:14px;
}



/* Inputs */

.login-box input[type="email"],
.login-box input[type="password"]{

    width:100%;
    padding:11px;

    margin-bottom:15px;

    border:none;
    border-radius:5px;

    outline:none;

    font-size:14px;

}



/* Password area */

.password-box{
    position:relative;
}



.help{
    position:absolute;
    right:10px;
    top:10px;
    width:18px;
    height:18px;
    background:#777;
    border-radius:3px;
    cursor:cursor;
}


.message{

    display:none;
    position:absolute;
    right:-5px;
    top:-45px;
    width:200px;
    background:#222;
    color:white;


    padding:8px;

    border-radius:5px;


    font-size:12px;

    line-height:normal;

}



.help:hover .message{

    display:block;

}



/* Login button */

.login-box input[type="submit"]{

    width:100%;

    padding:11px;


    border:none;

    border-radius:5px;


    background:#ffb347;


    color:white;


    font-size:15px;


    cursor:pointer;

}



.login-box input[type="submit"]:hover{

    background:#f59a23;

}



/* Links */

.forgot{

    display:block;

    margin-top:15px;


    color:white;

    text-decoration:none;

    font-size:14px;

}



.signup{

    margin-top:18px;

}



.signup a{

    color:#ffe16b;

    text-decoration:none;

}
    </style>
    
</head>

<body>

<header>
    <h2>AKshit</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">About</a>
    </nav>
</header>


<div class="circle left"></div>
<div class="circle right"></div>


<div class="login-box">

    <h1>Welcome!</h1>
    <p>Please sign in to continue</p>


    <form onsubmit="return false;">

        <input type="email" placeholder="Email Address">


        <div class="password-box">

            <input type="password" 
                   placeholder="Password"
                   maxlength="8">


            <span class="help">
                
    <span class="message">
        Password should not be more than 8 letters.
    </span>
            </span>

        </div>


        <input type="submit" value="Login">

    </form>


    <a href="#" class="forgot">
        Forgot Password?
    </a>


    <p class="signup">
        No account?
        <a href="#">Sign Up</a>
    </p>


</div>


</body>
</html>
